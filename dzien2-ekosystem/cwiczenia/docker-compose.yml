# Postgres dla Dnia 2 (Shop). Start:  docker compose up -d
# Podgląd w DataGrip/DBeaver:  Host=localhost  Port=55432  DB=Shop  User=postgres  (bez hasła - trust)
# Konwencja z systemu referencyjnego M8L4 (POSTGRES_HOST_AUTH_METHOD=trust), baza przemianowana na Shop.
services:
  postgres:
    image: postgres:16
    container_name: shop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=postgres
      - POSTGRES_DB=Shop
    ports:
      # host 55432 → kontener 5432. Nietypowy port, żeby nie kolidować z lokalnym Postgresem na 5432.
      - "55432:5432"
    volumes:
      - shop-postgres:/var/lib/postgresql/data

volumes:
  shop-postgres:
